<!DOCTYPE html>
<html>
<head>

<body>

<h1>AI Based Digital Forensics Analyzer</h1>

<div class="dashboard">

    <div class="card">
        <h2>📂 Upload Logs</h2>
        <input type="file" id="logFile">
    </div>

        <p>Detect abnormal login attempts</p>

    <div class="card">
        <h2>📄 Reports</h2>
        <p>Download forensic evidence</p>
    </div>

</div>

<script src="script.js"></script>

</body>
